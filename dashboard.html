<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purok League | Pro Operations</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Barlow+Condensed:ital,wght@0,700;1,900&display=swap');

        :root {
            --sport-orange: #FF4500;
            --deep-charcoal: #111111;
            --stadium-white: #FFFFFF;
            --field-border: #000000;
            --glass: rgba(255, 255, 255, 0.1);
        }

        /* --- CUSTOM SCROLLBAR --- */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--deep-charcoal); }
        ::-webkit-scrollbar-thumb { background: var(--sport-orange); border: 2px solid var(--deep-charcoal); border-radius: 5px; }

        html { scroll-behavior: smooth; }
        body { margin: 0; background: #f0f2f5; font-family: 'Barlow Condensed', sans-serif; text-transform: uppercase; }

        /* --- UPDATED HERO BANNER --- */
        .hero-banner {
            height: 450px; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('2.jpg') center/cover no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 10px solid var(--sport-orange); 
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .hero-content { 
            z-index: 10; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- LOGO STYLE --- */
        .league-logo {
            width: 100px;
            height: 100px;
            background: var(--sport-orange);
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); 
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.5);
        }

        .league-logo span {
            font-family: 'Archivo Black';
            font-size: 2.2rem;
            color: white;
            transform: skewX(-5deg);
        }

        .hero-content h1 { 
            font-family: 'Archivo Black'; 
            font-size: 5.5rem; 
            margin: 0; 
            line-height: 0.85;
            text-shadow: 4px 4px 0px var(--field-border);
        }

        .banner-tag { 
            color: var(--sport-orange); 
            font-weight: 900; 
            letter-spacing: 8px; 
            margin-bottom: 5px;
            font-size: 1.1rem;
        }
        
        /* --- NAVIGATION --- */
        .nav-bar {
            background: var(--deep-charcoal);
            padding: 15px 40px;
            display: flex;
            gap: 20px;
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 2px solid #333;
        }

        .nav-bar a {
            color: white;
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            padding: 8px 20px;
            border: 2px solid transparent;
            transition: 0.3s;
        }

        .nav-bar a:hover { border-color: var(--sport-orange); color: var(--sport-orange); }

        /* --- DASHBOARD GRID --- */
        .container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border: 4px solid var(--field-border);
            padding: 25px;
            box-shadow: 10px 10px 0px var(--field-border);
            margin-bottom: 30px;
        }

        /* --- LIVE SCORE CONTROLLER --- */
        .scoreboard-ctrl {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #1a1a1a;
            color: white;
            padding: 30px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .team-box { text-align: center; }
        .score-num { font-family: 'Archivo Black'; font-size: 4rem; color: var(--sport-orange); }
        
        .ctrl-btns { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
        .btn-add {
            background: #333;
            color: white;
            border: none;
            padding: 10px 15px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-add:hover { background: var(--sport-orange); }

        .btn-finish {
            width: 100%;
            background: #000;
            color: var(--sport-orange);
            border: 2px solid var(--sport-orange);
            padding: 15px;
            font-family: 'Archivo Black';
            font-size: 1.1rem;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-finish:hover { background: var(--sport-orange); color: white; }

        .foul-picker {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 5px;
            font-family: 'Barlow Condensed';
            font-weight: 700;
        }

        input {
            padding: 12px;
            border: 2px solid #ddd;
            font-family: 'Barlow Condensed';
            font-weight: 700;
            text-transform: uppercase;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-item {
            background: #f8f9fa;
            padding: 15px;
            border-left: 5px solid var(--field-border);
            display: flex;
            justify-content: space-between;
        }

        .tag-live {
            background: red;
            padding: 2px 10px;
            font-size: 0.8rem;
            vertical-align: middle;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }
        @media (max-width: 1000px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <a href="index.html" onclick="showSection('home')" id="link-home" class="active">HOME</a>
        <a href="dashboard.html#dashboard" onclick="showSection('dashboard')" id="link-dashboard">DASHBOARD</a>
        <a href="history.html" onclick="showSection('history')" id="link-history">HISTORY</a>
    </nav>
    
    <main class="container" id="dashboard">
        
        <section class="ops-panel">
            <div class="card">
                <div style="display: flex; justify-content: space-between;">
                    <h2 style="margin:0">LIVE GAME CONTROL <span class="tag-live">LIVE</span></h2>
                    <span style="font-weight: 900;">STATUS: IN-PROGRESS</span>
                </div>
                <hr style="border: 2px solid #eee; margin: 20px 0;">

                <div class="scoreboard-ctrl">
                    <div class="team-box">
                        <h3 id="team1-name">PUROK 1</h3>
                        <div class="score-num" id="score1">0</div>
                        <div class="ctrl-btns">
                            <button class="btn-add" onclick="updateScore('score1', -1)">-1</button>
                            <button class="btn-add" onclick="updateScore('score1', 1)">+1</button>
                            <button class="btn-add" onclick="updateScore('score1', 2)">+2</button>
                            <button class="btn-add" onclick="updateScore('score1', 3)">+3</button>
                        </div>
                        <div class="ctrl-btns" style="margin-top:15px;">
                            <select id="foulType1" class="foul-picker">
                                <option value="PERSONAL">PERSONAL</option>
                                <option value="TECHNICAL">TECHNICAL</option>
                                <option value="FLAGRANT">FLAGRANT</option>
                            </select>
                            <button class="btn-add" onclick="addFoul(1)">ADD FOUL</button>
                        </div>
                    </div>

                    <div style="font-family: 'Archivo Black'; font-size: 2rem;">VS</div>

                    <div class="team-box">
                        <h3 id="team2-name">PUROK 4</h3>
                        <div class="score-num" id="score2">0</div>
                        <div class="ctrl-btns">
                            <button class="btn-add" onclick="updateScore('score2', -1)">-1</button>
                            <button class="btn-add" onclick="updateScore('score2', 1)">+1</button>
                            <button class="btn-add" onclick="updateScore('score2', 2)">+2</button>
                            <button class="btn-add" onclick="updateScore('score2', 3)">+3</button>
                        </div>
                        <div class="ctrl-btns" style="margin-top:15px;">
                            <select id="foulType2" class="foul-picker">
                                <option value="PERSONAL">PERSONAL</option>
                                <option value="TECHNICAL">TECHNICAL</option>
                                <option value="FLAGRANT">FLAGRANT</option>
                            </select>
                            <button class="btn-add" onclick="addFoul(2)">ADD FOUL</button>
                        </div>
                    </div>
                </div>

                <button class="btn-finish" onclick="finishMatch()">FINISH MATCH & LOG RESULT</button>

                <div class="stats-grid">
                    <div class="stat-item"><span>TEAM FOULS (P1)</span> <strong id="foulDisplay1" style="color:red">0/5</strong></div>
                    <div class="stat-item"><span>TEAM FOULS (P4)</span> <strong id="foulDisplay2">0/5</strong></div>
                </div>
            </div>

            <div class="card" id="register">
                <h2>GENERATE NEW MATCH</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <input type="text" id="homeTeamInput" placeholder="HOME TEAM">
                    <input type="text" id="awayTeamInput" placeholder="AWAY TEAM">
                    <input type="date" id="matchDate">
                    <input type="time" id="matchTime">
                    <button class="btn-add" onclick="initializeMatch()" style="grid-column: span 2; padding: 20px; background: var(--sport-orange); font-size: 1.2rem;">INITIALIZE GAME DATA</button>
                </div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="card">
                <h2>LIVE EVENT LOG</h2>
                <div id="eventLog" style="font-size: 0.9rem; max-height: 200px; overflow-y: auto;">
                    <p style="color: var(--sport-orange);">• SYSTEM READY</p>
                </div>
            </div>

            <div class="card" id="historyCard">
                <h2>LOG HISTORY</h2>
                <div id="logHistoryList" style="font-size: 0.9rem;">
                    <p>• P1 VS P2 - COMPLETED (102-88)</p>
                </div>
            </div>
        </aside>
    </main>

    <script>
        let foulsTeam1 = 0;
        let foulsTeam2 = 0;

        function updateScore(elementId, points) {
            const el = document.getElementById(elementId);
            let current = parseInt(el.innerText);
            let newVal = current + points;
            el.innerText = newVal < 0 ? 0 : newVal;
        }

        function addFoul(teamNum) {
            const type = document.getElementById('foulType' + teamNum).value;
            const teamName = document.getElementById('team' + teamNum + '-name').innerText;
            const log = document.getElementById('eventLog');

            if(teamNum === 1) foulsTeam1++; else foulsTeam2++;
            
            document.getElementById('foulDisplay' + teamNum).innerText = (teamNum === 1 ? foulsTeam1 : foulsTeam2) + "/5";

            const entry = document.createElement('p');
            entry.innerHTML = `• <strong>${type} FOUL:</strong> ${teamName}`;
            log.insertBefore(entry, log.firstChild);
        }

        function initializeMatch() {
            const home = document.getElementById('homeTeamInput').value;
            const away = document.getElementById('awayTeamInput').value;
            if(!home || !away) { alert("ENTER TEAMS!"); return; }

            document.getElementById('team1-name').innerText = home;
            document.getElementById('team2-name').innerText = away;
            document.getElementById('score1').innerText = "0";
            document.getElementById('score2').innerText = "0";
            foulsTeam1 = 0; foulsTeam2 = 0;
            document.getElementById('foulDisplay1').innerText = "0/5";
            document.getElementById('foulDisplay2').innerText = "0/5";
            alert("NEW GAME LOADED!");
        }

        function finishMatch() {
            const team1 = document.getElementById('team1-name').innerText;
            const team2 = document.getElementById('team2-name').innerText;
            const score1 = document.getElementById('score1').innerText;
            const score2 = document.getElementById('score2').innerText;

            if(confirm(`LOG FINAL SCORE: ${team1} ${score1} - ${score2} ${team2}?`)) {
                const historyList = document.getElementById('logHistoryList');
                const logEntry = document.createElement('p');
                logEntry.innerHTML = `• ${team1} VS ${team2} - COMPLETED (${score1}-${score2})`;
                historyList.insertBefore(logEntry, historyList.firstChild);
                alert("GAME LOGGED.");
            }
        }
    </script>
</body>
</html>
